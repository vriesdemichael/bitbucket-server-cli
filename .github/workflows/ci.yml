name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linear-history:
    name: Linear History
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Verify PR branch has no merge commits
        run: task quality:git:ensure-linear

  adr-validation:
    name: ADR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Validate ADR records
        run: task quality:validate-decisions

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Run Go tests (targeted non-live package scope)
        run: task test:go:safe

      - name: "Note: using committed scoped combined coverage profile"
        run: echo "Using committed scoped combined coverage profile generated by local quality workflow."

      - name: Upload combined scoped coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: docs/quality/coverage.combined.scoped.out
          flags: combined_scoped
          fail_ci_if_error: true

      - name: Skip Codecov upload when token is unavailable
        if: env.CODECOV_TOKEN == ''
        run: echo "CODECOV_TOKEN not available; skipping Codecov upload."

  coverage-report-policy:
    name: Coverage Report Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Resolve CI coverage thresholds from repo config
        run: |
          set -euo pipefail

          if [[ ! -f .github/coverage-thresholds.env ]]; then
            echo "Missing .github/coverage-thresholds.env"
            exit 1
          fi

          # shellcheck disable=SC1091
          source .github/coverage-thresholds.env

          global="${CI_COVERAGE_MIN_GLOBAL_COMBINED:-85}"
          patch="${CI_COVERAGE_MIN_PATCH:-85}"
          min_patch_lines="${CI_COVERAGE_MIN_PATCH_LINES:-30}"
          max_uncovered_small_patch="${CI_COVERAGE_MAX_UNCOVERED_SMALL_PATCH:-2}"
          contract="${CI_COVERAGE_MIN_CONTRACT:-0}"

          is_number() {
            [[ "$1" =~ ^[0-9]+([.][0-9]+)?$ ]]
          }

          is_number "$global" || { echo "Invalid CI_COVERAGE_MIN_GLOBAL_COMBINED: $global"; exit 1; }
          is_number "$patch" || { echo "Invalid CI_COVERAGE_MIN_PATCH: $patch"; exit 1; }
          [[ "$min_patch_lines" =~ ^[0-9]+$ ]] || { echo "Invalid CI_COVERAGE_MIN_PATCH_LINES: $min_patch_lines"; exit 1; }
          [[ "$max_uncovered_small_patch" =~ ^[0-9]+$ ]] || { echo "Invalid CI_COVERAGE_MAX_UNCOVERED_SMALL_PATCH: $max_uncovered_small_patch"; exit 1; }
          is_number "$contract" || { echo "Invalid CI_COVERAGE_MIN_CONTRACT: $contract"; exit 1; }

          awk -v value="$global" 'BEGIN { exit !(value >= 85) }' || {
            echo "CI_COVERAGE_MIN_GLOBAL_COMBINED must be >= 85 per ADR coverage floor."
            exit 1
          }

          awk -v value="$patch" 'BEGIN { exit !(value >= 85) }' || {
            echo "CI_COVERAGE_MIN_PATCH must be >= 85 per ADR coverage floor."
            exit 1
          }

          awk -v value="$min_patch_lines" 'BEGIN { exit !(value <= 30) }' || {
            echo "CI_COVERAGE_MIN_PATCH_LINES must be <= 30 per ADR small-patch policy (stricter values are allowed)."
            exit 1
          }

          awk -v value="$max_uncovered_small_patch" 'BEGIN { exit !(value <= 2) }' || {
            echo "CI_COVERAGE_MAX_UNCOVERED_SMALL_PATCH must be <= 2 per ADR small-patch policy (stricter values are allowed)."
            exit 1
          }

          echo "COVERAGE_MIN_GLOBAL_COMBINED=$global" >> "$GITHUB_ENV"
          echo "COVERAGE_MIN_PATCH=$patch" >> "$GITHUB_ENV"
          echo "COVERAGE_MIN_PATCH_LINES=$min_patch_lines" >> "$GITHUB_ENV"
          echo "COVERAGE_MAX_UNCOVERED_SMALL_PATCH=$max_uncovered_small_patch" >> "$GITHUB_ENV"
          echo "COVERAGE_MIN_CONTRACT=$contract" >> "$GITHUB_ENV"

      - name: Verify committed coverage report policy
        run: |
          task quality:coverage:report:verify:committed \
            COVERAGE_MIN_GLOBAL_COMBINED="$COVERAGE_MIN_GLOBAL_COMBINED" \
            COVERAGE_MIN_PATCH="$COVERAGE_MIN_PATCH" \
            COVERAGE_MIN_PATCH_LINES="$COVERAGE_MIN_PATCH_LINES" \
            COVERAGE_MAX_UNCOVERED_SMALL_PATCH="$COVERAGE_MAX_UNCOVERED_SMALL_PATCH" \
            COVERAGE_MIN_CONTRACT="$COVERAGE_MIN_CONTRACT"

  docs-site:
    name: Docs Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Build docs site
        run: task docs:validate

  live-tests:
    name: Live Integration Tests
    runs-on: ubuntu-latest
    # Skip for fork pull requests where the BITBUCKET_LICENSE_KEY secret is
    # unavailable.  The committed-artifact coverage gate (coverage-report-policy
    # job) remains active as a fallback for those cases.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    timeout-minutes: 30
    env:
      BITBUCKET_URL: http://localhost:7990
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Create .env file (required by docker/compose.yml env_file directive)
        run: touch .env

      - name: Start Bitbucket stack
        env:
          BITBUCKET_LICENSE_KEY: ${{ secrets.BITBUCKET_LICENSE_KEY }}
        run: docker compose -f docker/compose.yml up -d

      - name: Bootstrap Bitbucket (wait for ready + create admin user)
        run: bash scripts/bootstrap-bitbucket.sh

      - name: Run unit tests with coverage
        run: task test:unit:coverage

      - name: Run live integration tests with coverage
        run: task test:live:coverage

      - name: Fetch origin/main for quality-report base ref
        run: git fetch origin main

      - name: Resolve CI coverage thresholds
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source .github/coverage-thresholds.env
          echo "COVERAGE_MIN_GLOBAL_COMBINED=${CI_COVERAGE_MIN_GLOBAL_COMBINED:-85}" >> "$GITHUB_ENV"
          echo "COVERAGE_MIN_PATCH=${CI_COVERAGE_MIN_PATCH:-85}" >> "$GITHUB_ENV"
          echo "COVERAGE_MIN_PATCH_LINES=${CI_COVERAGE_MIN_PATCH_LINES:-30}" >> "$GITHUB_ENV"
          echo "COVERAGE_MAX_UNCOVERED_SMALL_PATCH=${CI_COVERAGE_MAX_UNCOVERED_SMALL_PATCH:-2}" >> "$GITHUB_ENV"
          echo "COVERAGE_MIN_CONTRACT=${CI_COVERAGE_MIN_CONTRACT:-0}" >> "$GITHUB_ENV"

      - name: Verify committed quality report is current
        run: |
          go run ./tools/quality-report \
            -coverprofile .tmp/coverage.unit.out \
            -live-coverprofile .tmp/coverage.live.out \
            -base-ref origin/main \
            -manifest docs/quality/generated-operation-contracts.json \
            -report-file docs/quality/coverage-report.json \
            -raw-coverprofile-file docs/quality/coverage.combined.raw.out \
            -scoped-coverprofile-file docs/quality/coverage.combined.scoped.out \
            -verify-report -verify-coverprofiles \
            -min-global-combined "$COVERAGE_MIN_GLOBAL_COMBINED" \
            -min-patch "$COVERAGE_MIN_PATCH" \
            -min-patch-lines "$COVERAGE_MIN_PATCH_LINES" \
            -max-uncovered-small-patch "$COVERAGE_MAX_UNCOVERED_SMALL_PATCH" \
            -min-contract "$COVERAGE_MIN_CONTRACT"

      - name: Stop Bitbucket stack
        if: always()
        run: docker compose -f docker/compose.yml down

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs:
      - linear-history
      - adr-validation
      - unit-tests
      - coverage-report-policy
      - docs-site
      - live-tests
    if: always()
    steps:
      - name: Verify all required CI jobs passed
        env:
          LINEAR_HISTORY_RESULT: ${{ needs.linear-history.result }}
          ADR_VALIDATION_RESULT: ${{ needs.adr-validation.result }}
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          COVERAGE_REPORT_POLICY_RESULT: ${{ needs.coverage-report-policy.result }}
          DOCS_SITE_RESULT: ${{ needs.docs-site.result }}
          LIVE_TESTS_RESULT: ${{ needs.live-tests.result }}
        run: |
          [[ "$LINEAR_HISTORY_RESULT" == "success" ]]
          [[ "$ADR_VALIDATION_RESULT" == "success" ]]
          [[ "$UNIT_TESTS_RESULT" == "success" ]]
          [[ "$COVERAGE_REPORT_POLICY_RESULT" == "success" ]]
          [[ "$DOCS_SITE_RESULT" == "success" ]]
          [[ "$LIVE_TESTS_RESULT" == "success" || "$LIVE_TESTS_RESULT" == "skipped" ]]
