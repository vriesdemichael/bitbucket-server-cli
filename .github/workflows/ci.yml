name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linear-history:
    name: Linear History
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify PR branch has no merge commits
        run: task quality:git:ensure-linear

  adr-validation:
    name: ADR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate ADR records
        run: task quality:validate-decisions

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Go tests (targeted non-live package scope)
        run: task test:go:safe

  docs-site:
    name: Docs Site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render changelog for docs validation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .tmp
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --paginate > .tmp/releases.json
          python scripts/render_docs_changelog.py --releases-json .tmp/releases.json --releases-page-url "https://github.com/${GITHUB_REPOSITORY}/releases" --output docs/site/changelog.md

      - name: Build docs site
        run: task docs:validate

  live-tests:
    name: Live Integration Tests
    runs-on: ubuntu-latest
    # Skip for fork pull requests where the BITBUCKET_LICENSE_KEY secret is
    # unavailable.  ci-complete accepts both success and skipped results.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    timeout-minutes: 30
    env:
      BITBUCKET_URL: http://localhost:7990
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file (required by docker/compose.yml env_file directive)
        run: touch .env

      - name: Start Bitbucket stack
        env:
          BITBUCKET_LICENSE_KEY: ${{ secrets.BITBUCKET_LICENSE_KEY }}
        run: docker compose -f docker/compose.yml up -d

      - name: Bootstrap Bitbucket (wait for ready + create admin user)
        env:
          BITBUCKET_LICENSE_KEY: ${{ secrets.BITBUCKET_LICENSE_KEY }}
        run: bash scripts/bootstrap-bitbucket.sh "$BITBUCKET_URL" "$ADMIN_USER" "$ADMIN_PASSWORD"

      - name: Run unit tests with coverage
        run: task test:unit:coverage

      - name: Run live integration tests with coverage
        run: task test:live:coverage

      - name: Fetch origin/main for quality-report base ref
        run: git fetch origin main

      - name: Resolve CI coverage thresholds
        run: |
          set -euo pipefail

          thresholds_file=.github/coverage-thresholds.env
          if [ ! -f "$thresholds_file" ]; then
            echo "Missing coverage thresholds file: $thresholds_file" >&2
            exit 1
          fi

          # shellcheck disable=SC1091
          source "$thresholds_file"

          COVERAGE_MIN_GLOBAL_COMBINED="${CI_COVERAGE_MIN_GLOBAL_COMBINED:-85}"
          COVERAGE_MIN_PATCH="${CI_COVERAGE_MIN_PATCH:-85}"
          COVERAGE_MIN_PATCH_LINES="${CI_COVERAGE_MIN_PATCH_LINES:-30}"
          COVERAGE_MAX_UNCOVERED_SMALL_PATCH="${CI_COVERAGE_MAX_UNCOVERED_SMALL_PATCH:-2}"
          COVERAGE_MIN_CONTRACT="${CI_COVERAGE_MIN_CONTRACT:-0}"

          for var in COVERAGE_MIN_GLOBAL_COMBINED COVERAGE_MIN_PATCH COVERAGE_MIN_PATCH_LINES COVERAGE_MAX_UNCOVERED_SMALL_PATCH COVERAGE_MIN_CONTRACT; do
            value="${!var}"
            if ! [[ "$value" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
              echo "Invalid numeric value for $var: $value" >&2
              exit 1
            fi
          done

          {
            echo "COVERAGE_MIN_GLOBAL_COMBINED=$COVERAGE_MIN_GLOBAL_COMBINED"
            echo "COVERAGE_MIN_PATCH=$COVERAGE_MIN_PATCH"
            echo "COVERAGE_MIN_PATCH_LINES=$COVERAGE_MIN_PATCH_LINES"
            echo "COVERAGE_MAX_UNCOVERED_SMALL_PATCH=$COVERAGE_MAX_UNCOVERED_SMALL_PATCH"
            echo "COVERAGE_MIN_CONTRACT=$COVERAGE_MIN_CONTRACT"
          } >> "$GITHUB_ENV"

      - name: Verify coverage quality gates
        run: |
          go run ./tools/quality-report \
            -coverprofile .tmp/coverage.unit.out \
            -live-coverprofile .tmp/coverage.live.out \
            -base-ref origin/main \
            -manifest docs/quality/generated-operation-contracts.json \
            -scoped-coverprofile-file .tmp/coverage.combined.scoped.out \
            -write-coverprofiles \
            -min-global-combined "$COVERAGE_MIN_GLOBAL_COMBINED" \
            -min-patch "$COVERAGE_MIN_PATCH" \
            -min-patch-lines "$COVERAGE_MIN_PATCH_LINES" \
            -max-uncovered-small-patch "$COVERAGE_MAX_UNCOVERED_SMALL_PATCH" \
            -min-contract "$COVERAGE_MIN_CONTRACT"

      - name: Upload combined scoped coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: .tmp/coverage.combined.scoped.out
          flags: combined_scoped
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Stop Bitbucket stack
        if: always()
        run: docker compose -f docker/compose.yml down

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs:
      - linear-history
      - adr-validation
      - unit-tests
      - docs-site
      - live-tests
    if: always()
    steps:
      - name: Verify all required CI jobs passed
        env:
          LINEAR_HISTORY_RESULT: ${{ needs.linear-history.result }}
          ADR_VALIDATION_RESULT: ${{ needs.adr-validation.result }}
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          DOCS_SITE_RESULT: ${{ needs.docs-site.result }}
          LIVE_TESTS_RESULT: ${{ needs.live-tests.result }}
        run: |
          [[ "$LINEAR_HISTORY_RESULT" == "success" ]]
          [[ "$ADR_VALIDATION_RESULT" == "success" ]]
          [[ "$UNIT_TESTS_RESULT" == "success" ]]
          [[ "$DOCS_SITE_RESULT" == "success" ]]
          [[ "$LIVE_TESTS_RESULT" == "success" || "$LIVE_TESTS_RESULT" == "skipped" ]]
