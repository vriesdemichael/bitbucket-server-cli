name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version tag override (for example v0.1.0)
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  determine-version:
    name: Determine release version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.compute.outputs.should_release }}
      version: ${{ steps.compute.outputs.version }}
      previous_tag: ${{ steps.compute.outputs.previous_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version from Conventional Commits
        id: compute
        env:
          MANUAL_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          import subprocess


          def run_git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()


          def write_output(key: str, value: str) -> None:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write(f"{key}={value}\n")


          manual_version = os.environ.get("MANUAL_VERSION", "").strip()
          semver_pattern = re.compile(r"^v\d+\.\d+\.\d+(?:[.-][0-9A-Za-z.-]+)?$")

          try:
              previous_tag = run_git("describe", "--tags", "--abbrev=0", "--match", "v[0-9]*.[0-9]*.[0-9]*")
          except subprocess.CalledProcessError:
              previous_tag = ""

          if manual_version:
              if not semver_pattern.match(manual_version):
                  raise SystemExit("Manual version must look like vMAJOR.MINOR.PATCH (optionally with prerelease/build suffix).")
              write_output("should_release", "true")
              write_output("version", manual_version)
              write_output("previous_tag", previous_tag)
              raise SystemExit(0)

          range_spec = f"{previous_tag}..HEAD" if previous_tag else "HEAD"
          raw = run_git("log", "--no-merges", "--pretty=format:%H%x1f%s%x1f%b%x1e", range_spec)
          records = [record for record in raw.split("\x1e") if record.strip()]

          conventional_pattern = re.compile(r"^(?P<type>[a-z]+)(?:\((?P<scope>[^)]+)\))?(?P<bang>!)?: (?P<description>.+)$")

          bump_level = 0
          found_conventional = False
          for record in records:
              parts = record.split("\x1f", 2)
              if len(parts) < 2:
                  continue
              subject = parts[1].strip()
              body = parts[2] if len(parts) > 2 else ""
              match = conventional_pattern.match(subject)
              if not match:
                  continue

              found_conventional = True
              commit_type = match.group("type")
              has_breaking_footer = "BREAKING CHANGE:" in body or "BREAKING-CHANGE:" in body
              is_breaking = bool(match.group("bang")) or has_breaking_footer

              if is_breaking:
                  bump_level = max(bump_level, 3)
              elif commit_type == "feat":
                  bump_level = max(bump_level, 2)
              else:
                  bump_level = max(bump_level, 1)

          if not found_conventional or bump_level == 0:
              write_output("should_release", "false")
              write_output("version", "")
              write_output("previous_tag", previous_tag)
              raise SystemExit(0)

          base_version = previous_tag[1:] if previous_tag else "0.0.0"
          major, minor, patch = [int(part) for part in base_version.split(".")]

          if bump_level == 3:
              major, minor, patch = major + 1, 0, 0
          elif bump_level == 2:
              minor, patch = minor + 1, 0
          else:
              patch += 1

          next_version = f"v{major}.{minor}.{patch}"
          try:
              run_git("rev-parse", "--verify", "--quiet", next_version)
              write_output("should_release", "false")
              write_output("version", "")
              write_output("previous_tag", previous_tag)
              raise SystemExit(0)
          except subprocess.CalledProcessError:
              pass

          write_output("should_release", "true")
          write_output("version", next_version)
          write_output("previous_tag", previous_tag)
          PY

  build-artifacts:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }} artifact
    needs:
      - determine-version
    if: ${{ needs.determine-version.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
            binary_ext: ""
          - goos: linux
            goarch: arm64
            archive: tar.gz
            binary_ext: ""
          - goos: darwin
            goarch: amd64
            archive: tar.gz
            binary_ext: ""
          - goos: darwin
            goarch: arm64
            archive: tar.gz
            binary_ext: ""
          - goos: windows
            goarch: amd64
            archive: zip
            binary_ext: .exe
          - goos: windows
            goarch: arm64
            archive: zip
            binary_ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version input
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like vMAJOR.MINOR.PATCH (optionally with prerelease/build suffix)."
            exit 1
          fi

      - name: Embed Windows PE metadata
        if: matrix.goos == 'windows'
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          set -euo pipefail
          go install github.com/tc-hib/go-winres@v0.3.3
          VERSION_NO_V="${VERSION#v}"
          # PE version must be X.Y.Z.W (four numeric components)
          PE_VERSION="${VERSION_NO_V}.0"
          YEAR="$(date -u +%Y)"
          go-winres simply \
            --arch amd64,arm64 \
            --out cmd/bb/rsrc \
            --manifest cli \
            --file-description "Bitbucket Server CLI" \
            --product-name "Bitbucket Server CLI" \
            --file-version "${PE_VERSION}" \
            --product-version "${PE_VERSION}" \
            --copyright "Copyright ${YEAR} Michael de Vries" \
            --original-filename "bb.exe"

      - name: Build and package artifact
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
          BINARY_EXT: ${{ matrix.binary_ext }}
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION_NO_V="${VERSION#v}"
          BINARY_NAME="bb${BINARY_EXT}"
          ARCHIVE_BASENAME="bb_${VERSION_NO_V}_${GOOS}_${GOARCH}"

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags "-s -w -buildid= -X main.Version=${VERSION}" -o "$BINARY_NAME" ./cmd/bb

          if [[ "$ARCHIVE" == "zip" ]]; then
            ARCHIVE_NAME="${ARCHIVE_BASENAME}.zip"
            zip -q "dist/${ARCHIVE_NAME}" "$BINARY_NAME"
          else
            ARCHIVE_NAME="${ARCHIVE_BASENAME}.tar.gz"
            tar -czf "dist/${ARCHIVE_NAME}" "$BINARY_NAME"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs:
      - determine-version
      - build-artifacts
    if: ${{ needs.determine-version.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Validate version input
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like vMAJOR.MINOR.PATCH (optionally with prerelease/build suffix)."
            exit 1
          fi

      - name: Generate changelog from Conventional Commits
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
          PREVIOUS_TAG: ${{ needs.determine-version.outputs.previous_tag }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          import subprocess


          def run_git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()


          version = os.environ["VERSION"]
          previous_tag = os.environ.get("PREVIOUS_TAG", "").strip()
          repository_url = os.environ["REPOSITORY_URL"].rstrip("/")
          range_spec = f"{previous_tag}..HEAD" if previous_tag else "HEAD"

          raw = run_git("log", "--no-merges", "--pretty=format:%H%x1f%s%x1f%b%x1e", range_spec)
          records = [record for record in raw.split("\x1e") if record.strip()]

          conventional_pattern = re.compile(r"^(?P<type>[a-z]+)(?:\((?P<scope>[^)]+)\))?(?P<bang>!)?: (?P<description>.+)$")
          breaking_footer_pattern = re.compile(r"^BREAKING(?:-| )CHANGE:\s*(.+)$", re.MULTILINE)

          section_titles = {
              "feat": "Features",
              "fix": "Fixes",
              "perf": "Performance",
              "refactor": "Refactors",
              "docs": "Docs",
              "test": "Tests",
              "build": "Build",
              "ci": "CI",
              "chore": "Chores",
          }
          ordered_sections = [
              "Features",
              "Fixes",
              "Performance",
              "Refactors",
              "Docs",
              "Tests",
              "Build",
              "CI",
              "Chores",
              "Other",
          ]

          grouped = {section: [] for section in ordered_sections}
          breaking_changes = []
          all_entries = []

          for record in records:
              parts = record.split("\x1f", 2)
              if len(parts) < 2:
                  continue

              sha = parts[0].strip()
              subject = parts[1].strip()
              body = parts[2] if len(parts) > 2 else ""
              commit_url = f"{repository_url}/commit/{sha}"

              match = conventional_pattern.match(subject)
              if match:
                  commit_type = match.group("type")
                  description = match.group("description")
                  scope = match.group("scope")
                  is_breaking = bool(match.group("bang")) or bool(breaking_footer_pattern.search(body))
              else:
                  commit_type = "other"
                  description = subject
                  scope = None
                  is_breaking = bool(breaking_footer_pattern.search(body))

              section = section_titles.get(commit_type, "Other")
              entry = {
                  "sha": sha,
                  "shortSha": sha[:7],
                  "subject": subject,
                  "description": description,
                  "scope": scope,
                  "type": commit_type,
                  "section": section,
                  "breaking": is_breaking,
                  "url": commit_url,
              }
              grouped[section].append(entry)
              all_entries.append(entry)

              if is_breaking:
                  footer_match = breaking_footer_pattern.search(body)
                  entry_with_note = dict(entry)
                  entry_with_note["breakingNote"] = footer_match.group(1).strip() if footer_match else ""
                  breaking_changes.append(entry_with_note)

          compare_url = ""
          if previous_tag:
              compare_url = f"{repository_url}/compare/{previous_tag}...{version}"

          lines = [f"## {version}", ""]
          if previous_tag:
              lines.append(f"Changes since {previous_tag}.")
              lines.append("")
              lines.append(f"Compare: [{previous_tag}...{version}]({compare_url})")
              lines.append("")
          else:
              lines.append("Initial release changes.")
              lines.append("")

          if breaking_changes:
              lines.append("### ⚠ Breaking Changes")
              for item in breaking_changes:
                  breaking_note = f" — {item['breakingNote']}" if item.get("breakingNote") else ""
                  lines.append(f"- {item['description']} ([{item['shortSha']}]({item['url']})){breaking_note}")
              lines.append("")

          for section in ordered_sections:
              entries = grouped[section]
              if not entries:
                  continue
              lines.append(f"### {section}")
              for item in entries:
                  scoped_description = f"{item['scope']}: {item['description']}" if item.get("scope") else item["description"]
                  lines.append(f"- {scoped_description} ([{item['shortSha']}]({item['url']}))")
              lines.append("")

          with open("RELEASE_NOTES.md", "w", encoding="utf-8") as markdown_file:
              markdown_file.write("\n".join(lines).rstrip() + "\n")

          payload = {
              "version": version,
              "previousTag": previous_tag,
              "compareUrl": compare_url,
              "commits": all_entries,
              "breakingChanges": breaking_changes,
          }
          with open("changelog.json", "w", encoding="utf-8") as json_file:
              json.dump(payload, json_file, indent=2)
              json_file.write("\n")
          PY

      - name: Create and push annotated tag
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists; continuing with release publication."
          else
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
          fi

      - name: Generate checksums
        run: |
          set -euo pipefail
          (
            cd dist
            find . -maxdepth 1 -type f ! -name 'sha256sums.txt' -print0 | sort -z | xargs -0 sha256sum > sha256sums.txt
          )

      - name: Generate GitHub provenance attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" --title "$VERSION" --notes-file RELEASE_NOTES.md
            gh release upload "$VERSION" dist/* changelog.json --clobber
          else
            gh release create "$VERSION" --title "$VERSION" --notes-file RELEASE_NOTES.md dist/* changelog.json
          fi

      - name: Render changelog for published docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .tmp
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --paginate > .tmp/releases.json
          python scripts/render_docs_changelog.py --releases-json .tmp/releases.json --releases-page-url "https://github.com/${GITHUB_REPOSITORY}/releases" --output docs/site/changelog.md

      - name: Publish versioned docs to GitHub Pages branch
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          task docs:deploy-version VERSION="$VERSION"

  winget-release:
    name: Publish to WinGet
    needs:
      - determine-version
      - release
    if: ${{ needs.determine-version.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Publish to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: vriesdemichael.bb
          release-tag: ${{ needs.determine-version.outputs.version }}
          installers-regex: '^bb_.*_windows_(amd64|arm64)\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

  scoop-release:
    name: Publish to Scoop
    needs:
      - determine-version
      - release
    if: ${{ needs.determine-version.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.determine-version.outputs.version }}
    steps:
      - name: Download checksums from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "sha256sums.txt" \
            --output sha256sums.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update Scoop bucket manifest
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          set -euo pipefail
          export VERSION_NO_V="${VERSION#v}"
          export HASH_AMD64
          HASH_AMD64=$(grep "bb_${VERSION_NO_V}_windows_amd64.zip" sha256sums.txt | awk '{print $1}')
          export HASH_ARM64
          HASH_ARM64=$(grep "bb_${VERSION_NO_V}_windows_arm64.zip" sha256sums.txt | awk '{print $1}')
          export BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"

          git clone https://github.com/vriesdemichael/scoop.git scoop-bucket
          cd scoop-bucket
          git config credential.helper \
            '!f() { printf "username=x-access-token\npassword=%s\n" "${SCOOP_BUCKET_TOKEN}"; }; f'

          python - <<'PY'
          import json, os
          version_no_v = os.environ["VERSION_NO_V"]
          hash_amd64   = os.environ["HASH_AMD64"]
          hash_arm64   = os.environ["HASH_ARM64"]
          base_url     = os.environ["BASE_URL"]
          repo_url     = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
          manifest = {
              "version": version_no_v,
              "description": "A CLI for Bitbucket Server / Bitbucket Data Center",
              "homepage": repo_url,
              "license": "Apache-2.0",
              "architecture": {
                  "64bit": {
                      "url": f"{base_url}/bb_{version_no_v}_windows_amd64.zip",
                      "hash": hash_amd64,
                  },
                  "arm64": {
                      "url": f"{base_url}/bb_{version_no_v}_windows_arm64.zip",
                      "hash": hash_arm64,
                  },
              },
              "bin": "bb.exe",
              "checkver": {"github": repo_url},
              "autoupdate": {
                  "architecture": {
                      "64bit": {"url": f"{repo_url}/releases/download/v$version/bb_$version_windows_amd64.zip"},
                      "arm64": {"url": f"{repo_url}/releases/download/v$version/bb_$version_windows_arm64.zip"},
                  },
              },
          }
          with open("bb.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bb.json
          git diff --cached --quiet || git commit -m "Update bb to ${VERSION}"
          git push
