name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-artifacts:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }} artifact
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
            binary_ext: ""
          - goos: linux
            goarch: arm64
            archive: tar.gz
            binary_ext: ""
          - goos: darwin
            goarch: amd64
            archive: tar.gz
            binary_ext: ""
          - goos: darwin
            goarch: arm64
            archive: tar.gz
            binary_ext: ""
          - goos: windows
            goarch: amd64
            archive: zip
            binary_ext: .exe
          - goos: windows
            goarch: arm64
            archive: zip
            binary_ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like vMAJOR.MINOR.PATCH (optionally with prerelease/build suffix)."
            exit 1
          fi

      - name: Build and package artifact
        env:
          VERSION: ${{ inputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
          BINARY_EXT: ${{ matrix.binary_ext }}
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION_NO_V="${VERSION#v}"
          BINARY_NAME="bbsc${BINARY_EXT}"
          ARCHIVE_BASENAME="bbsc_${VERSION_NO_V}_${GOOS}_${GOARCH}"

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -o "$BINARY_NAME" ./cmd/bbsc

          if [[ "$ARCHIVE" == "zip" ]]; then
            ARCHIVE_NAME="${ARCHIVE_BASENAME}.zip"
            zip -q "dist/${ARCHIVE_NAME}" "$BINARY_NAME"
          else
            ARCHIVE_NAME="${ARCHIVE_BASENAME}.tar.gz"
            tar -czf "dist/${ARCHIVE_NAME}" "$BINARY_NAME"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs:
      - build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like vMAJOR.MINOR.PATCH (optionally with prerelease/build suffix)."
            exit 1
          fi

      - name: Ensure release tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists."
            exit 1
          fi

      - name: Generate changelog from Conventional Commits
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          RANGE=""
          if [[ -n "$LAST_TAG" ]]; then
            RANGE="$LAST_TAG..HEAD"
          fi

          mapfile -t COMMITS < <(git log --no-merges --pretty=format:%s $RANGE)

          {
            echo "## $VERSION"
            echo
            if [[ -n "$LAST_TAG" ]]; then
              echo "Changes since $LAST_TAG."
            else
              echo "Initial release changes."
            fi
            echo

            declare -a FEAT FIX PERF REFACTOR DOCS TEST BUILD CI CHORE OTHER
            for SUBJECT in "${COMMITS[@]}"; do
              case "$SUBJECT" in
                feat\(*|feat:*) FEAT+=("$SUBJECT") ;;
                fix\(*|fix:*) FIX+=("$SUBJECT") ;;
                perf\(*|perf:*) PERF+=("$SUBJECT") ;;
                refactor\(*|refactor:*) REFACTOR+=("$SUBJECT") ;;
                docs\(*|docs:*) DOCS+=("$SUBJECT") ;;
                test\(*|test:*) TEST+=("$SUBJECT") ;;
                build\(*|build:*) BUILD+=("$SUBJECT") ;;
                ci\(*|ci:*) CI+=("$SUBJECT") ;;
                chore\(*|chore:*) CHORE+=("$SUBJECT") ;;
                *) OTHER+=("$SUBJECT") ;;
              esac
            done

            write_section() {
              local heading="$1"
              shift
              local entries=("$@")
              if [[ ${#entries[@]} -eq 0 ]]; then
                return
              fi
              echo "### $heading"
              for item in "${entries[@]}"; do
                echo "- $item"
              done
              echo
            }

            write_section "Features" "${FEAT[@]}"
            write_section "Fixes" "${FIX[@]}"
            write_section "Performance" "${PERF[@]}"
            write_section "Refactors" "${REFACTOR[@]}"
            write_section "Docs" "${DOCS[@]}"
            write_section "Tests" "${TEST[@]}"
            write_section "Build" "${BUILD[@]}"
            write_section "CI" "${CI[@]}"
            write_section "Chores" "${CHORE[@]}"
            write_section "Other" "${OTHER[@]}"
          } > RELEASE_NOTES.md

      - name: Create and push annotated tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Generate checksums
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > dist/sha256sums.txt

      - name: Generate GitHub provenance attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" --title "$VERSION" --notes-file RELEASE_NOTES.md dist/*