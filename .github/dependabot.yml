version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      gomod-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/docs"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      python-docs-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directories:
      - "/docker"
      - "/docker/custom-bitbucket"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore"
      include: "scope"