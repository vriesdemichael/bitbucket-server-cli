version: 1
updated_at: "2026-04-08"
source_openapi: docs/reference/atlassian/bitbucket-9.4-openapi.json
fixes:
  - id: OPENAPI-001
    area: spec-path-parameters
    description: Add missing path parameter declarations required by oapi-codegen.
    reference:
      type: endpoint
      value: /api/latest/projects/{projectKey}/repos/{repositorySlug}/secret-scanning/exempt
      upstream_issue: positional path params present in URL template but absent from operation parameters
    change:
      files:
        - tools/openapi-sanitize/main.go
      detail: >
        The sanitizer injects required path parameters into operations when placeholders are present
        in the route template but not declared in the OpenAPI operation parameter list.
    verification:
      commands:
        - task models:generate
        - task client:generate

  - id: OPENAPI-002
    area: spec-operationid-collisions
    description: Normalize and de-duplicate operationIds to keep generated symbols deterministic and unique.
    reference:
      type: generation
      value: oapi-codegen operation/type naming
      upstream_issue: duplicate or empty operationIds can create conflicting generated declarations
    change:
      files:
        - tools/openapi-sanitize/main.go
      detail: >
        The sanitizer canonicalizes operationIds and applies stable suffixing when collisions are found,
        including generation of fallback operationIds for operations missing one.
    verification:
      commands:
        - task models:verify
        - task client:verify

  - id: OPENAPI-003
    area: model-generation-dedupe
    description: Preserve a deterministic cleanup step for generated model type collisions.
    reference:
      type: generation
      value: internal/models/generated/bitbucket_types.gen.go
      upstream_issue: duplicate type declarations can be emitted for specific schema combinations
    change:
      files:
        - tools/oapi-fix-generated/main.go
        - Taskfile.yml
      detail: >
        models:generate runs a post-generation dedupe pass that removes repeated type declarations
        while preserving first occurrence and formatting output with gofmt.
    verification:
      commands:
        - task models:verify

  - id: OPENAPI-004
    area: live-contract-parity
    description: Seed live data before parity checks to validate non-empty contract behavior.
    reference:
      type: test
      value: tests/integration/live/openapi_parity_test.go
      upstream_issue: empty-list parity can pass without validating end-to-end contract fidelity
    change:
      files:
        - tests/integration/live/openapi_parity_test.go
        - internal/services/repository/service.go
      detail: >
        The live test provisions a unique user, project, and repository, retrieves project-scoped
        repositories through both manual and generated clients, asserts seeded repository presence,
        and performs cleanup.
    verification:
      commands:
        - go test -tags=live ./tests/integration/live -run TestOpenAPIParity

  - id: OPENAPI-005
    area: pull-request-settings-required-approvers
    description: Support legacy integer payload fallback for requiredApprovers updates.
    reference:
      type: endpoint
      value: /api/latest/projects/{projectKey}/repos/{repositorySlug}/settings/pull-requests
      upstream_issue: OpenAPI models requiredApprovers as an object, but some live instances reject object payloads and only accept an integer
    change:
      files:
        - internal/services/reposettings/service.go
        - internal/services/reposettings/service_test.go
      detail: >
        Update flow sends the modern object payload first ({enabled,count}) and falls back to
        the legacy integer payload when the server returns a validation-style payload error.
        This preserves compatibility with environments where the documented object contract
        is not accepted at runtime.
    verification:
      commands:
        - go test ./internal/services/reposettings -run TestUpdateRepositoryPullRequestRequiredApproversCount
        - go test -tags=live ./tests/integration/live -run TestLiveRepoSettingsUpdatePullRequestRequiredApprovers

  - id: OPENAPI-006
    area: pull-request-activities-comment-payload
    description: Parse raw pull request activity payloads to recover comment details omitted by the generated activity model.
    reference:
      type: endpoint
      value: /api/latest/projects/{projectKey}/repos/{repositorySlug}/pull-requests/{pullRequestId}/activities
      upstream_issue: generated RestPullRequestActivity omits the nested comment payload needed for aggregate PR comment retrieval
    change:
      files:
        - internal/services/pullrequestactivity/service.go
        - tests/integration/live/repo_cli_live_test.go
      detail: >
        The client keeps using the generated activities endpoint, but decodes the raw response body into
        an internal activity adapter so nested comment objects and anchors remain available for aggregate
        pull request comment listing and AI/debug activity inspection.
    verification:
      commands:
        - go test ./internal/services/pullrequestactivity ./internal/cli ./internal/mcp
        - go test -tags=live ./tests/integration/live -run TestLiveCLIRepoListAndComments -count=1
