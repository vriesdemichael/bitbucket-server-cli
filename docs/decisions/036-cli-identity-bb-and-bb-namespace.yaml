number: 36
title: CLI identity bb and BB namespace
category: architecture
status: accepted
decision: >
  Standardize the public CLI identity on `bb` before first broad release. This includes
  command invocation, release artifact binary names, environment variable namespace,
  local config directory naming, keyring service naming, machine output contract name,
  and bulk workflow apiVersion identifiers.
agent_instructions: >
  Use `bb` for command examples and command path assumptions. Use `BB_*` for CLI/runtime
  environment variables. Keep defaults under `~/.config/bb/` and use keyring service name `bb`.
  Emit machine envelopes with contract `bb.machine` on version `v2`.
  Use `bb.io/v1alpha1` for bulk workflow apiVersion constants and schema examples.
rationale: >
  The project is still pre-public-release, so this is the safest window for intentional
  compatibility breaks that reduce long-term migration burden. Aligning names early avoids
  carrying legacy aliases and dual namespaces in automation and documentation.
rejected_alternatives:
  - alternative: Keep bbsc primary and add bb alias
    reason: Retains naming debt and prolongs migration complexity without user benefit pre-release.
  - alternative: Keep BBSC_* environment variables while renaming command only
    reason: Creates an inconsistent public contract and confusion for new users.
provenance: human
