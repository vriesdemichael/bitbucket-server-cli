number: 37
title: Versioned docs via MkDocs Material and mike
category: development
status: accepted
decision: >
  Adopt MkDocs with the Material theme as the documentation framework and use mike
  for versioned deployments to GitHub Pages. Build docs in CI and publish versioned
  docs from the release workflow.
agent_instructions: >
  Keep docs source in a dedicated MkDocs docs directory and validate with strict builds.
  Use Taskfile tasks for docs build/serve/deploy workflows. In release automation,
  publish the computed release version and update a stable alias (for example `latest`).
  Prefer uv/uvx as the first-choice tooling for Python-based scripts and docs tasks;
  use docs/pyproject.toml dependency metadata rather than ad-hoc virtualenv setup.
rationale: >
  MkDocs Material provides a modern interface with minimal maintenance overhead in a
  Python-light repository, and mike adds simple versioned docs semantics that align with
  release tags. This supports incremental docs delivery while keeping publication automated.
rejected_alternatives:
  - alternative: Keep README-only documentation
    reason: Not sufficient for scalable, navigable, versioned public docs.
  - alternative: Use a Node-based docs stack
    reason: Adds avoidable ecosystem/tooling overhead for this repository.
provenance: human
