number: 30
title: Linear rebase workflow with generated coverage artifacts
category: development
status: accepted
decision: >
  Enforce linear PR history (no merge commits) and use a deterministic rebase flow
  when committed quality artifacts are generated from local test runs.
  During rebases, do not manually reconcile coverage artifact conflicts; complete the
  rebase, then regenerate docs/quality/coverage-report.json once and commit it as a
  final artifact refresh.
agent_instructions: >
  Keep PR branches linear against origin/main. Use rebase, never merge main into PR
  branches. If coverage-report.json conflicts during rebase, avoid interactive/manual
  conflict edits for historical artifact commits; resolve to continue rebase, then run
  task pr:linearize (or task quality:coverage:report:update) and commit the refreshed
  report once at the end. Before push, verify linear history and coverage artifact checks
  pass. Prefer force-with-lease after branch history rewrites.
rationale: >
  Rebase-only merge policies can reject branches that include merge commits even when
  checks are green. Generated coverage artifacts frequently conflict across rebases and
  are easy for lower-capability agents to mishandle interactively. A deterministic,
  scripted flow reduces failure modes, prevents repeated conflict churn, and keeps PRs
  consistently rebaseable.
rejected_alternatives:
  - alternative: Allow merge commits on PR branches and rely on merge button policy
    reason: Conflicts with the established rebase-only history discipline.
  - alternative: Keep resolving coverage artifacts manually during each rebase conflict
    reason: Error-prone and difficult for lightweight models to execute reliably.
  - alternative: Stop committing coverage-report.json
    reason: Conflicts with the existing quality contract that verifies committed artifacts.
provenance: guided-ai
