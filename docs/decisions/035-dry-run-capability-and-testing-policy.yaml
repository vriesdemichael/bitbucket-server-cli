number: 35
title: Dry-run capability signaling and test strategy policy
category: development
status: accepted
decision: >
  Dry-run implementations must explicitly signal capability level and planning mode in output.
  Static planning paths are validated with unit tests, while stateful dry-run behavior is validated
  via live integration tests focused on no-side-effect guarantees, context-before/context-after
  verification, and realistic multi-step previews.
agent_instructions: >
  For dry-run features, always include explicit capability signaling (for example full/partial)
  and planning mode in output payloads. Add focused unit tests for static preview behavior and
  focused live tests for stateful behavior and side-effect prevention. Avoid synthetic coverage-only
  tests; each test should prove a concrete safety or contract guarantee.
rationale: >
  Explicit capability signaling prevents false confidence during rollout. Separating unit coverage
  (static logic) from live validation (stateful behavior) aligns with project testing policies and
  improves confidence that dry-run does not mutate server state. Requiring before/after state
  checks for live dry-run tests makes the safety contract concrete rather than implied.
rejected_alternatives:
  - alternative: Omit capability signaling until full parity exists
    reason: Hides maturity gaps and makes operator decisions less safe.
  - alternative: Use only unit tests for all dry-run behavior
    reason: Cannot prove no server side effects for stateful/API-backed planning paths.
provenance: human
