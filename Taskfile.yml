version: '3'

vars:
  OAPI_CODEGEN_VERSION: v2.4.1
  BITBUCKET_OPENAPI_URL: https://dac-static.atlassian.com/server/bitbucket/9.4.swagger.v3.json?_v=1.637.27
  BITBUCKET_OPENAPI_TARGET: docs/reference/atlassian/bitbucket-9.4-openapi.json
  BITBUCKET_OPENAPI_TMP: .tmp/bitbucket-9.4-openapi.json
  BITBUCKET_OPENAPI_SANITIZED_TMP: .tmp/bitbucket-9.4-openapi.sanitized.json
  DOCS_PROJECT_DIR: docs
  COVERAGE_BASE_REF: origin/main
  COVERAGE_MIN_GLOBAL_COMBINED: "85"
  COVERAGE_MIN_PATCH: "85"
  COVERAGE_MIN_PATCH_LINES: "30"
  COVERAGE_MAX_UNCOVERED_SMALL_PATCH: "2"
  COVERAGE_MIN_CONTRACT: "0"

tasks:
  default:
    desc: Show available tasks
    cmd: task --list

  docs:refresh-openapi:
    desc: Refresh vendored Atlassian Bitbucket 9.4 OpenAPI reference
    cmds:
      - mkdir -p .tmp docs/reference/atlassian
      - curl -fsSL '{{.BITBUCKET_OPENAPI_URL}}' -o '{{.BITBUCKET_OPENAPI_TMP}}'
      - python3 -c "import json; d=json.load(open('.tmp/bitbucket-9.4-openapi.json', 'r', encoding='utf-8')); assert d.get('openapi') == '3.0.1', 'unexpected openapi version'; assert d.get('info', {}).get('version') == '9.4', 'unexpected API version'; print('validated openapi paths=' + str(len(d.get('paths', {}))))"
      - cp '{{.BITBUCKET_OPENAPI_TMP}}' '{{.BITBUCKET_OPENAPI_TARGET}}'

  docs:build:
    desc: Build MkDocs site with strict checks
    cmds:
      - uv run --project '{{.DOCS_PROJECT_DIR}}' mkdocs build --strict

  docs:serve:
    desc: Serve MkDocs site locally
    cmds:
      - uv run --project '{{.DOCS_PROJECT_DIR}}' mkdocs serve --dev-addr 127.0.0.1:8000

  docs:deploy-version:
    desc: Deploy versioned docs to gh-pages via mike (requires VERSION)
    requires:
      vars:
        - VERSION
    cmds:
      - uv run --project '{{.DOCS_PROJECT_DIR}}' mike deploy --push --update-aliases {{.VERSION}} latest
      - uv run --project '{{.DOCS_PROJECT_DIR}}' mike set-default --push latest

  models:generate:
    desc: Generate Go models from vendored Bitbucket 9.4 OpenAPI spec
    cmds:
      - mkdir -p internal/models/generated
      - go run ./tools/openapi-sanitize -in docs/reference/atlassian/bitbucket-9.4-openapi.json -out {{.BITBUCKET_OPENAPI_SANITIZED_TMP}}
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@{{.OAPI_CODEGEN_VERSION}} -config tools/oapi-codegen/bitbucket-types.yaml {{.BITBUCKET_OPENAPI_SANITIZED_TMP}}
      - go run ./tools/oapi-fix-generated -file internal/models/generated/bitbucket_types.gen.go
      - gofmt -w internal/models/generated/bitbucket_types.gen.go

  models:verify:
    desc: Verify generated models are up to date
    cmds:
      - task: models:generate
      - git diff --exit-code -- internal/models/generated/bitbucket_types.gen.go

  client:generate:
    desc: Generate Go OpenAPI client from vendored Bitbucket 9.4 OpenAPI spec
    cmds:
      - mkdir -p internal/openapi/generated
      - go run ./tools/openapi-sanitize -in docs/reference/atlassian/bitbucket-9.4-openapi.json -out {{.BITBUCKET_OPENAPI_SANITIZED_TMP}}
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@{{.OAPI_CODEGEN_VERSION}} -config tools/oapi-codegen/bitbucket-client.yaml {{.BITBUCKET_OPENAPI_SANITIZED_TMP}}
      - gofmt -w internal/openapi/generated/bitbucket_client.gen.go

  client:verify:
    desc: Verify generated OpenAPI client is up to date
    cmds:
      - task: client:generate
      - git diff --exit-code -- internal/openapi/generated/bitbucket_client.gen.go

  quality:validate-decisions:
    desc: Validate ADR decision records with Go validator
    cmd: go run ./tools/adr-validator --validate

  docs:export-bulk-schemas:
    desc: Export JSON Schemas for bulk policy artifacts
    cmd: go run ./tools/bulk-schema-export -out docs/reference/schemas

  quality:git:ensure-linear:
    desc: Fail when branch contains merge commits relative to origin/main
    cmds:
      - git fetch origin main
      - |
        merge_count="$(git rev-list --count --merges origin/main..HEAD)"
        if [ "$merge_count" != "0" ]; then
          echo "Branch must be linear (rebase-only). Found $merge_count merge commit(s) in origin/main..HEAD."
          git log --oneline --merges origin/main..HEAD
          exit 1
        fi
        echo "Branch is linear (no merge commits in origin/main..HEAD)."

  quality:check:
    desc: Run core quality checks
    deps:
      - quality:git:ensure-linear
      - quality:validate-decisions
      - quality:coverage:report:verify

  pr:linearize:
    desc: Rebase branch on origin/main and refresh committed coverage report artifact
    cmds:
      - git fetch origin --prune
      - git rebase origin/main
      - task: quality:coverage:report:update
      - git add docs/quality/coverage-report.json
      - |
        if git diff --cached --quiet -- docs/quality/coverage-report.json; then
          echo "coverage report unchanged"
        else
          git commit -m "docs(quality): refresh committed coverage report after linear rebase"
        fi

  quality:coverage:
    desc: Run combined (unit + live) global + patch coverage checks and generated-operation coverage metric
    cmds:
      - git fetch origin main
      - task: test:unit:coverage
      - task: test:live:coverage
      - go run ./tools/quality-report -coverprofile .tmp/coverage.unit.out -live-coverprofile .tmp/coverage.live.out -base-ref {{.COVERAGE_BASE_REF}} -manifest docs/quality/generated-operation-contracts.json -min-global-combined {{.COVERAGE_MIN_GLOBAL_COMBINED}} -min-patch {{.COVERAGE_MIN_PATCH}} -min-patch-lines {{.COVERAGE_MIN_PATCH_LINES}} -max-uncovered-small-patch {{.COVERAGE_MAX_UNCOVERED_SMALL_PATCH}} -min-contract {{.COVERAGE_MIN_CONTRACT}}

  quality:coverage:origin-main:
    desc: Run combined (unit + live) global + patch coverage gates against origin/main (requires live infra)
    cmds:
      - git fetch origin main
      - task: test:unit:coverage
      - task: test:live:coverage
      - go run ./tools/quality-report -coverprofile .tmp/coverage.unit.out -live-coverprofile .tmp/coverage.live.out -base-ref origin/main -manifest docs/quality/generated-operation-contracts.json -min-global-combined {{.COVERAGE_MIN_GLOBAL_COMBINED}} -min-patch {{.COVERAGE_MIN_PATCH}} -min-patch-lines {{.COVERAGE_MIN_PATCH_LINES}} -max-uncovered-small-patch {{.COVERAGE_MAX_UNCOVERED_SMALL_PATCH}} -min-contract {{.COVERAGE_MIN_CONTRACT}}

  quality:coverage:report:update:
    desc: Update committed combined coverage report artifact
    cmds:
      - git fetch origin main
      - task: test:unit:coverage
      - task: test:live:coverage
      - go run ./tools/quality-report -coverprofile .tmp/coverage.unit.out -live-coverprofile .tmp/coverage.live.out -base-ref {{.COVERAGE_BASE_REF}} -manifest docs/quality/generated-operation-contracts.json -report-file docs/quality/coverage-report.json -raw-coverprofile-file docs/quality/coverage.combined.raw.out -scoped-coverprofile-file docs/quality/coverage.combined.scoped.out -write-report -write-coverprofiles -min-global-combined {{.COVERAGE_MIN_GLOBAL_COMBINED}} -min-patch {{.COVERAGE_MIN_PATCH}} -min-patch-lines {{.COVERAGE_MIN_PATCH_LINES}} -max-uncovered-small-patch {{.COVERAGE_MAX_UNCOVERED_SMALL_PATCH}} -min-contract {{.COVERAGE_MIN_CONTRACT}}

  quality:coverage:report:verify:
    desc: Verify committed coverage report artifact is current (local recompute, requires live infra)
    cmds:
      - git fetch origin main
      - task: test:unit:coverage
      - task: test:live:coverage
      - go run ./tools/quality-report -coverprofile .tmp/coverage.unit.out -live-coverprofile .tmp/coverage.live.out -base-ref {{.COVERAGE_BASE_REF}} -manifest docs/quality/generated-operation-contracts.json -report-file docs/quality/coverage-report.json -raw-coverprofile-file docs/quality/coverage.combined.raw.out -scoped-coverprofile-file docs/quality/coverage.combined.scoped.out -verify-report -verify-coverprofiles -min-global-combined {{.COVERAGE_MIN_GLOBAL_COMBINED}} -min-patch {{.COVERAGE_MIN_PATCH}} -min-patch-lines {{.COVERAGE_MIN_PATCH_LINES}} -max-uncovered-small-patch {{.COVERAGE_MAX_UNCOVERED_SMALL_PATCH}} -min-contract {{.COVERAGE_MIN_CONTRACT}}

  quality:coverage:report:verify:committed:
    desc: Verify committed coverage report artifact thresholds (CI-safe, no live execution)
    cmds:
      - go run ./tools/quality-report -report-file docs/quality/coverage-report.json -raw-coverprofile-file docs/quality/coverage.combined.raw.out -scoped-coverprofile-file docs/quality/coverage.combined.scoped.out -verify-committed -min-global-combined {{.COVERAGE_MIN_GLOBAL_COMBINED}} -min-patch {{.COVERAGE_MIN_PATCH}} -min-patch-lines {{.COVERAGE_MIN_PATCH_LINES}} -max-uncovered-small-patch {{.COVERAGE_MAX_UNCOVERED_SMALL_PATCH}} -min-contract {{.COVERAGE_MIN_CONTRACT}}

  test:unit:
    desc: Run Go unit tests
    cmd: go test ./cmd/... ./internal/... ./tools/...

  test:go:safe:
    desc: Run targeted non-live Go tests over maintained Go packages
    cmd: go test ./cmd/... ./internal/... ./tools/...

  test:unit:coverage:
    desc: Run Go unit tests with coverage profile output
    cmds:
      - mkdir -p .tmp
      - go test -covermode=count -coverprofile=.tmp/coverage.unit.out ./cmd/... ./internal/... ./tools/...
      - go tool cover -func=.tmp/coverage.unit.out | tail -n 1

  test:live:coverage:
    desc: Run live integration tests with coverage profile output over hand-written packages
    cmds:
      - mkdir -p .tmp
      - go test -tags=live -covermode=count -coverpkg=./cmd/...,./internal/...,./tools/... -coverprofile=.tmp/coverage.live.out ./tests/integration/live
      - go tool cover -func=.tmp/coverage.live.out | tail -n 1

  test:live:
    desc: Run live integration tests against local Bitbucket stack
    cmd: go test -tags=live ./tests/integration/live

  stack:up:
    desc: Start local Bitbucket + Postgres stack
    cmd: docker compose -f docker/compose.yml up -d

  stack:down:
    desc: Stop local Bitbucket + Postgres stack
    cmd: docker compose -f docker/compose.yml down

  stack:restart:
    desc: Restart local Bitbucket + Postgres stack
    cmds:
      - task: stack:down
      - task: stack:up

  stack:status:
    desc: Show local stack status
    cmd: docker compose -f docker/compose.yml ps

  stack:logs:
    desc: Tail Bitbucket service logs
    cmd: docker compose -f docker/compose.yml logs -f bitbucket
