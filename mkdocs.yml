site_name: Bitbucket Server CLI
site_description: CLI automation for Bitbucket Server and Data Center
site_url: https://vriesdemichael.github.io/bitbucket-server-cli/
repo_url: https://github.com/vriesdemichael/bitbucket-server-cli
repo_name: vriesdemichael/bitbucket-server-cli
docs_dir: docs/site
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal

extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

validation:
  nav:
    omitted_files: ignore

nav:
  - Home: index.md
  - Installation and Quickstart: installation-and-quickstart.md
  - Basic Usage: basic-usage.md
  - Command Reference:
      - Overview: reference/overview.md
      - All Commands: reference/commands/index.md
      - JSON Schemas: reference/schemas.md
  - Advanced Topics:
      - Overview: advanced/index.md
      - Repository Discovery and Server Switching: advanced/repository-discovery-and-server-switching.md
      - Bulk Operations: advanced/bulk-operations.md
      - Dry-Run Planning: advanced/dry-run-planning.md
      - Machine Mode and Diagnostics: advanced/machine-mode-diagnostics.md
  - ADR Records: adr/index.md
  - Changelog: changelog.md
